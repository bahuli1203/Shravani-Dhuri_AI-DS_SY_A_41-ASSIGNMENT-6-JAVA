# =====================================================================
# Student API – Application Configuration
# =====================================================================

server:
  port: 8080

spring:
  application:
    name: student-api

  # ─── H2 In-Memory Database ───────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ─── JPA / Hibernate ─────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # Recreates schema on each run (dev mode)
    show-sql: true            # Logs all SQL statements (useful for learning)
    properties:
      hibernate:
        format_sql: true

  # ─── H2 Console (browser UI at http://localhost:8080/h2-console) ─
  h2:
    console:
      enabled: true
      path: /h2-console

# ─── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    com.example.studentapi: DEBUG
    org.springframework.web: INFO
